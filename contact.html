<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
     <div class="container">
        
    <div class="section-one">
    <h1 class="section-one__title">Nivetha Ravichandran 👩‍💻</h1>
    <p class="section-one__role">Web Developer</p>
    </div>
     
    <div class="contact-form">
    <form>
        <table>
            <tr>
                <td>Name:</td>
                <td><input type="text" placeholder="Enter your name" class="contact-form__input"></td>
            </tr>

            <tr>
                <td>Email:</td>
                <td><input type="text" placeholder="Enter your email" class="contact-form__input"></td>
            </tr>

            <tr>
                 <td>Message:</td>
                 <td><textarea name="Message" placeholder="Message..." class="contact-form__textarea" ></textarea></td>
            </tr>

            <tr>
                <td></td>
                <td><input type="Submit" class="contact-form__submit"></td>
            </tr>
        </table>
    </form>
    </div>
          
    <div class="section-five">
    <p section-five__title>Social Media:
        <a class="section-five__desc" href="">Instagram</a>
        <a class="section-five__desc" href="">Linkedin</a>
        <p class="section-five__descr">&copy; Nivetha Ravichandran</p>
    </div>

      </div>
